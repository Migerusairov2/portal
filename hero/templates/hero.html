{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>_Miguel.dev</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: #0a0a0c;
            color: #fff;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
        }

        /* =========================
           HERO LAYOUT
        ========================== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            gap: 3rem;
            align-items: center;
            z-index: 2;
        }

        /* =========================
           TEXT CONTENT
        ========================== */
        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.2rem;
        }

        .hero-title span {
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 500px;
        }

        /* =========================
           BUTTONS
        ========================== */
        .hero-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            padding: 0.9rem 1.6rem;
            background: #fff;
            color: #0a0a0c;
            border-radius: 999px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            padding: 0.9rem 1.6rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            color: #fff;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        /* =========================
           VISUAL CARD
        ========================== */
        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floating-card {
            width: 320px;
            height: 380px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 2rem;
            animation: floaty 6s ease-in-out infinite;
            rotate: 10deg;
        }

        .card-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            margin-bottom: 1rem;
        }

        .card-line {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            margin: 10px 0;
        }

        .card-line.short {
            width: 40%;
        }

        .card-line.long {
            width: 80%;
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
        }

        .blob-1 {
            background: #6366f1;
            top: -10%;
            left: 10%;
        }

        .blob-2 {
            background: #3b82f6;
            bottom: -10%;
            right: 10%;
        }

        /* =========================
           ANIMATIONS
        ========================== */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* =========================
           RESPONSIVE
        ========================== */
        @media (max-width: 768px) {
            .hero-container {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .hero-subtitle {
                margin: 0 auto 2rem;
            }

            .hero-actions {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

<!-- HERO -->
<section class="hero">

    <!-- BACKGROUND -->
    <div class="hero-bg">
        <div class="bg-glow blob-1"></div>
        <div class="bg-glow blob-2"></div>
    </div>

    <!-- CONTENT -->
    <div class="hero-container">

        <!-- LEFT -->
        <div>
            <h1 class="hero-title fade-up delay-1">
                Crafting Modern <span>Digital Experiences</span>
            </h1>

            <p class="hero-subtitle fade-up delay-2">
                Building diverse projects improves programming skills, strengthens problem-solving,
                and turns practice into real-world mastery.
            </p>

            <div class="hero-actions fade-up delay-3">
                <a href="#" class="btn-primary">Explore Projects</a>
                <a href="{% url 'overview' %}" class="btn-secondary">About Me</a>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="hero-visual fade-up delay-2">
            <div class="floating-card">
                <div class="card-dot"></div>
                <div class="card-line long"></div>
                <div class="card-line short"></div>
                <div class="card-line long"></div>
            </div>
        </div>

    </div>
</section>

</body>
</html>
