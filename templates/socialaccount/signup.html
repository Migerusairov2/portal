{% load i18n %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Complete Signup</title>

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --primary: #238636;
            --primary-hover: #2ea043;
            --input-bg: #0d1117;
            --link: #58a6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .wrapper {
            width: 100%;
            max-width: 380px;
        }

        .gh-logo {
            font-family: Consolas, Monaco, monospace;
            font-weight: 600;
            font-size: 20px;
            color: #e6edf3;
            margin-bottom: 4px;
            text-align: center;
            margin: 50px;
        }

        .prompt {
            font-family: Consolas, Monaco, monospace;
            font-size: 20px;
            color: var();

        }

        .cursor {
            font-size: 20px;
            font-family: Consolas, Monaco, monospace;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .heading {
            text-align: center;
            margin-bottom: 20px;
        }

        .heading h2 {
            font-size: 24px;
            font-weight: 300;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }

        .description {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        form p {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input,
        select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, .15);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .errorlist {
            list-style: none;
            color: #f85149;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .helptext {
            color: var(--muted);
            font-size: 12px;
            display: block;
            margin-top: 4px;
        }

        .footer {
            margin-top: 16px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }

        .footer a {
            color: var(--link);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="gh-logo">
            <span>Miguel</span><span style="color: #238636;" class="prompt">.Dev&gt;</span><span class="cursor">_</span>
        </div>


        <div class="heading">
            <h2>Complete your account</h2>
        </div>

        <div class="card">

            <p class="description">
                You successfully authenticated with a social account.
                Please complete the information below to finish creating your account.
            </p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit">
                    Complete Signup
                </button>
            </form>

        </div>

    </div>

</body>

</html>
