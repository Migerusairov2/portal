<!DOCTYPE html>
<html lang="en" data-color-mode="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set new password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --border:     #30363d;
      --border-hover: #6e7681;
      --text:       #e6edf3;
      --text-muted: #8b949e;
      --text-dim:   #6e7681;
      --green:      #238636;
      --green-hover:#2ea043;
      --green-glow: rgba(35,134,54,.35);
      --blue:       #58a6ff;
      --red:        #f85149;
      --input-bg:   #0d1117;
      --focus-ring: #1f6feb;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .gh-logo {
        font-family: Consolas, Monaco, monospace;
        font-weight: 600;
        font-size: 20px;
        color: #e6edf3;
        margin-bottom: 10px;
    }

    .prompt {
        font-family: Consolas, Monaco, monospace;
        font-size: 20px;
        color: var();

    }

    .cursor {
        font-size: 20px;
        font-family: Consolas, Monaco, monospace;
        animation: blink 1s step-end infinite;
    }

    @keyframes blink {
        50% {
            opacity: 0;
        }
    }


    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
    }

    .card h1 {
      font-size: 20px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }

    label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    label .hint {
      font-weight: 400;
      font-size: 12px;
      color: var(--text-muted);
    }

    input[type="password"] {
      width: 100%;
      padding: 6px 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      line-height: 20px;
    }

    input[type="password"]:hover { border-color: var(--border-hover); }

    input[type="password"]:focus {
      border-color: var(--focus-ring);
      box-shadow: 0 0 0 3px rgba(31,111,235,.3);
    }

    /* password strength bar */
    .strength-wrap {
      margin-top: 8px;
      display: none;
    }
    .strength-wrap.visible { display: block; }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width .3s, background .3s;
    }
    .strength-label {
      font-size: 11px;
      margin-top: 4px;
      color: var(--text-muted);
    }

    .checklist {
      list-style: none;
      margin: 12px 0 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }
    .checklist li {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .checklist li .icon { font-size: 10px; }
    .checklist li.pass { color: #3fb950; }
    .checklist li.fail { color: var(--text-dim); }

    .field-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 5px;
      display: none;
    }
    .field-error.visible { display: block; }
    input.input-error { border-color: var(--red) !important; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .btn-primary {
      width: 100%;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: var(--green);
      border: 1px solid rgba(240,246,252,.1);
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      line-height: 20px;
    }
    .btn-primary:hover { background: var(--green-hover); }
    .btn-primary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    .btn-primary:active { background: #1a7f37; }
    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .footer-card {
      width: 100%;
      max-width: 340px;
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .footer-card a {
      color: var(--blue);
      text-decoration: none;
    }
    .footer-card a:hover { text-decoration: underline; }

    .success-state { display: none; text-align: center; }
    .success-state.visible { display: block; }
    .success-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(35,134,54,.15);
      border: 1px solid rgba(35,134,54,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: #3fb950;
    }
    .success-state p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .success-state a.btn-primary {
      display: inline-block;
      text-decoration: none;
      padding: 6px 24px;
      width: auto;
    }

    .form-state { display: block; }
    .form-state.hidden { display: none; }
  </style>
</head>
<body>

    <div class="gh-logo">
        <span>Miguel</span><span style="color: #238636;" class="prompt">.Dev&gt;</span><span class="cursor">_</span>
    </div>

  <div class="card">

    <div class="form-state" id="formState">
      <h1>Set new password</h1>

      <form id="resetForm" novalidate>
        {% csrf_token %}

        <div class="field">
          <label for="id_password1">
            New password
          </label>
          <input
            type="password"
            id="id_password1"
            name="password1"
            autocomplete="new-password"
            autofocus
            placeholder=""
          />
          <div class="strength-wrap" id="strengthWrap">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>
          <ul class="checklist" id="checklist">
            <li id="chk-len" class="fail"><span class="icon">✕</span> 8+ characters</li>
            <li id="chk-upper" class="fail"><span class="icon">✕</span> Uppercase letter</li>
            <li id="chk-num" class="fail"><span class="icon">✕</span> Number</li>
            <li id="chk-sym" class="fail"><span class="icon">✕</span> Special character</li>
          </ul>
        </div>

        <div class="field">
          <label for="id_password2">
            Confirm password
            <span class="hint">Must match above</span>
          </label>
          <input
            type="password"
            id="id_password2"
            name="password2"
            autocomplete="new-password"
            placeholder=""
          />
          <div class="field-error" id="matchError">Passwords do not match.</div>
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn-primary" id="submitBtn" disabled>
          Change password
        </button>
      </form>
    </div>

    <div class="success-state" id="successState">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
          <path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/>
        </svg>
      </div>
      <h1 style="margin-bottom:8px;">Password updated</h1>
      <p>Your password has been changed successfully. Sign in with your new password.</p>
      <a href="/accounts/login/" class="btn-primary">Sign in</a>
    </div>

  </div>

  <div class="footer-card" id="footerCard">
    Remembered it? <a href="/accounts/login/">Sign in</a>
  </div>

  <script>
    const p1 = document.getElementById('id_password1');
    const p2 = document.getElementById('id_password2');
    const strengthWrap = document.getElementById('strengthWrap');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');
    const matchError = document.getElementById('matchError');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('resetForm');
    const formState = document.getElementById('formState');
    const successState = document.getElementById('successState');
    const footerCard = document.getElementById('footerCard');

    const checks = {
      len:   { el: document.getElementById('chk-len'),   test: v => v.length >= 8 },
      upper: { el: document.getElementById('chk-upper'), test: v => /[A-Z]/.test(v) },
      num:   { el: document.getElementById('chk-num'),   test: v => /[0-9]/.test(v) },
      sym:   { el: document.getElementById('chk-sym'),   test: v => /[^A-Za-z0-9]/.test(v) },
    };

    const levels = [
      { label: 'Very weak', color: '#f85149' },
      { label: 'Weak',      color: '#e3b341' },
      { label: 'Fair',      color: '#e3b341' },
      { label: 'Good',      color: '#3fb950' },
      { label: 'Strong',    color: '#3fb950' },
    ];

    function checkIcon(pass) { return pass ? '✓' : '✕'; }

    function evaluate() {
      const val = p1.value;
      const p2val = p2.value;

      if (val.length > 0) {
        strengthWrap.classList.add('visible');
      } else {
        strengthWrap.classList.remove('visible');
      }

      let score = 0;
      for (const [, c] of Object.entries(checks)) {
        const pass = c.test(val);
        if (pass) score++;
        c.el.className = pass ? 'pass' : 'fail';
        c.el.querySelector('.icon').textContent = checkIcon(pass);
      }

      const pct = val.length === 0 ? 0 : Math.max(10, score * 25);
      strengthFill.style.width = pct + '%';
      strengthFill.style.background = levels[score]?.color ?? '#f85149';
      strengthLabel.textContent = val.length === 0 ? '' : (levels[score]?.label ?? '');

      const allPass = score === 4;
      const match = p2val.length > 0 && p1.value === p2val;
      const mismatch = p2val.length > 0 && p1.value !== p2val;

      matchError.classList.toggle('visible', mismatch);
      p2.classList.toggle('input-error', mismatch);

      submitBtn.disabled = !(allPass && match);
    }

    p1.addEventListener('input', evaluate);
    p2.addEventListener('input', evaluate);

    form.addEventListener('submit', e => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating…';

      setTimeout(() => {
        formState.classList.add('hidden');
        successState.classList.add('visible');
        footerCard.style.display = 'none';
      }, 800);
    });
  </script>
</body>
</html>
