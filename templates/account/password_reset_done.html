{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check your email</title>
    <link rel="stylesheet" href="{% static 'src/css/password_reset_done.css' %}">

</head>

<body>

    <div class="container">

        <div class="card">

            <div class="email-icon">
                ✉
            </div>

            <h1>Check your email</h1>

            <p class="message">
                If an account exists for the email address you entered,
                you will receive a password reset link shortly.
                Please check your inbox and spam folder.
            </p>

            <div class="actions">
                <a href="/accounts/login/" class="btn">
                    Back to sign in
                </a>
            </div>

        </div>

        <div class="footer">
            Didn't receive an email?
            <a href="/accounts/password/reset/">
                Try again
            </a>
        </div>

    </div>

</body>

</html>
