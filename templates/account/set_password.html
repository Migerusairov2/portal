{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Set Password</title>
        <link rel="stylesheet" href="{% static 'src/css/set_password.css' %}">
</head>

<body>

    <div class="container">

        <div class="gh-logo">
            <span>Miguel</span><span style="color: #238636;" class="prompt">.Dev&gt;</span><span class="cursor">_</span>
        </div>



        <div class="title">
            <h2>Create password</h2>
        </div>


        <div class="card">
            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit">
                    Save Password
                </button>
            </form>
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn-cancel">
                    Cancel
                </button>
            </form>
        </div>


        <div class="footer">
            Your account is secured with a password now.
        </div>


    </div>

</body>

</html>
