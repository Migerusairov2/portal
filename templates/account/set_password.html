<!DOCTYPE html>
<html>

<head>
    <title>Set Password</title>

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --blue: #58a6ff;
            --green: #238636;
            --green-hover: #2ea043;
            --input: #0d1117;
            --danger: #f85149;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont,
                "Segoe UI", Helvetica, Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
        }


        /* Main container */
        .container {
            width: 100%;
            max-width: 360px;
        }


        /* Logo */
        .gh-logo {
            font-family: Consolas, Monaco, monospace;
            font-weight: 600;
            font-size: 20px;
            color: #e6edf3;
            margin-bottom: 4px;
            text-align: center;
            margin: 50px;
        }

        .prompt {
            font-family: Consolas, Monaco, monospace;
            font-size: 20px;
            color: var();

        }

        .cursor {
            font-size: 20px;
            font-family: Consolas, Monaco, monospace;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* Title */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .title h2 {
            font-size: 24px;
            font-weight: 300;
        }


        /* Card */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }


        /* Form */
        form {
            margin: 5px
        }

        form p {
            margin-bottom: 16px;
        }

        form .btn-cancel {
            background-color: #D51C39;
        }

        form .btn-cancel:hover {
            background-color: #FF6060;

        }



        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }


        input {
            width: 100%;
            padding: 10px 12px;

            background: var(--input);
            color: var(--text);

            border: 1px solid var(--border);
            border-radius: 6px;

            font-size: 14px;
        }


        input:focus {
            outline: none;

            border-color: var(--blue);

            box-shadow:
                0 0 0 3px rgba(88, 166, 255, .15);
        }


        /* Help text */
        .helptext {
            color: var(--muted);
            font-size: 12px;
        }


        /* Errors */
        .errorlist {
            color: var(--danger);
            list-style: none;
            padding: 0;

            font-size: 13px;
        }


        /* Button */
        button {

            width: 100%;

            background: var(--green);
            color: white;

            border: none;
            border-radius: 6px;

            padding: 10px;

            font-size: 14px;
            font-weight: 600;

            cursor: pointer;

            transition: .2s;
        }


        button:hover {
            background: var(--green-hover);
        }


        /* Bottom link area */
        .footer {

            margin-top: 16px;

            text-align: center;

            color: var(--muted);

            font-size: 14px;
        }


        .footer a {
            color: var(--blue);
            text-decoration: none;
        }


        .footer a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="gh-logo">
            <span>Miguel</span><span style="color: #238636;" class="prompt">.Dev&gt;</span><span class="cursor">_</span>
        </div>



        <div class="title">
            <h2>Create password</h2>
        </div>


        <div class="card">
            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit">
                    Save Password
                </button>
            </form>
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn-cancel">
                    Cancel
                </button>
            </form>
        </div>


        <div class="footer">
            Your account is secured with a password now.
        </div>


    </div>

</body>

</html>
