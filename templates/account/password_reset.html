<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 340px;
        }

        .gh-logo {
            font-family: Consolas, Monaco, monospace;
            font-weight: 600;
            font-size: 20px;
            color: #e6edf3;
            margin-bottom: 4px;
            text-align: center;
            margin: 50px;
        }

        .prompt {
            font-family: Consolas, Monaco, monospace;
            font-size: 20px;
            color: var();

        }

        .cursor {
            font-size: 20px;
            font-family: Consolas, Monaco, monospace;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }


        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 24px;
        }

        .help-text {
            color: #8b949e;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #e6edf3;
            font-size: 14px;
            margin-bottom: 16px;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, .15);
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #238636;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }

        .btn:hover {
            background: #2ea043;
        }

        .bottom {
            margin-top: 16px;
            text-align: center;
            padding: 16px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #161b22;
            font-size: 14px;
        }

        .bottom a {
            color: #58a6ff;
            text-decoration: none;
        }

        .bottom a:hover {
            text-decoration: underline;
        }

        .errorlist {
            list-style: none;
            color: #f85149;
            margin-bottom: 12px;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="gh-logo">
            <span>Miguel</span><span style="color: #238636;" class="prompt">.Dev&gt;</span><span class="cursor">_</span>
        </div>


        <div class="card">
            <h1 class="title">Reset your password</h1>

            <p class="help-text">
                Enter the email address associated with your account and we'll send you a password reset link.
            </p>

            <form method="post">
                {% csrf_token %}

                {{ form.non_field_errors }}

                <label for="{{ form.email.id_for_label }}">
                    Email address
                </label>

                {{ form.email }}

                <button type="submit" class="btn">
                    Send reset link
                </button>
            </form>
        </div>

        <div class="bottom">
            Remembered your password?
            <a href="{% url 'account_login' %}">
                Sign in
            </a>
        </div>

    </div>

</body>

</html>
