{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{% static 'src/css/password_reset.css' %}">

</head>

<body>

    <div class="container">

        <div class="gh-logo">
            <span>Miguel</span><span style="color: #238636;" class="prompt">.Dev&gt;</span><span class="cursor">_</span>
        </div>


        <div class="card">
            <h1 class="title">Reset your password</h1>

            <p class="help-text">
                Enter the email address associated with your account and we'll send you a password reset link.
            </p>

            <form method="post">
                {% csrf_token %}

                {{ form.non_field_errors }}

                <label for="{{ form.email.id_for_label }}">
                    Email address
                </label>

                {{ form.email }}

                <button type="submit" class="btn">
                    Send reset link
                </button>
            </form>
        </div>

        <div class="bottom">
            Remembered your password?
            <a href="{% url 'account_login' %}">
                Sign in
            </a>
        </div>

    </div>

</body>

</html>
